<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0b0c10">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <title>Terminal Vocab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="min-h-screen p-6 md:p-10 flex flex-col items-center">

    <div id="tela-login" class="flex flex-col items-center justify-center w-full max-w-md mx-auto mt-32 space-y-8">
    <h2 class="text-3xl font-bold text-gray-100">Acesse seu Grimoire</h2>
    <button onclick="entrarComGoogle()" class="flex items-center justify-center w-full gap-3 px-6 py-3 font-semibold text-gray-900 bg-white rounded-lg shadow-md hover:bg-gray-100 transition-colors">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-6 h-6" alt="Google">
        Entrar com o Google
    </button>
</div>

    <div id="tela-app" style="display:none;" class="w-full max-w-7xl">
        <header class="scan-header">
            <div class="logo-block">
                <h1 data-text="// TERMINAL VOCAB">
                    <span class="glyph">//</span> TERMINAL VOCAB<span class="cursor"></span>
                </h1>
                <p>Registro de Dados de Exploração</p>
            </div>
            
            <button onclick="sair()" class="text-xs font-bold text-gray-500 hover:text-red-500 transition-colors flex items-center gap-2 tracking-widest uppercase mb-1">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M10 12.5a.5.5 0 0 1-.5.5h-8a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v2a.5.5 0 0 0 1 0v-2A1.5 1.5 0 0 0 9.5 2h-8A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-2a.5.5 0 0 0-1 0v2z"/><path fill-rule="evenodd" d="M15.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0 0 0-.708.708L14.293 7.5H5.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0 0 .708.708l3-3z"/></svg>
                Desconectar
            </button>
        </header>

        <div class="flex flex-col lg:flex-row gap-8">
            <aside class="panel p-6 rounded-xl w-full lg:w-1/3 h-fit sticky top-6">
                <h3 class="text-sm font-bold text-gray-300 mb-6 uppercase tracking-widest flex items-center gap-2">
                    <span class="text-[#66fcf1]">+</span> Novo Registro
                </h3>

                <div class="space-y-5">
                    <div>
                        <label class="block text-[11px] font-bold text-gray-400 mb-2 uppercase tracking-wide">Termo Detectado (Inglês)</label>
                        <textarea id="novo-termo" rows="1" placeholder="Ex: Target..." class="input-dark w-full px-4 py-3 rounded-lg text-sm" oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
                    </div>

                    <div>
                        <label class="block text-[11px] font-bold text-gray-400 mb-2 uppercase tracking-wide">Tradução Decodificada</label>
                        <textarea id="traducao-automatica" rows="1" placeholder="Tradução aparecerá aqui..." class="input-dark w-full px-4 py-3 rounded-lg text-sm text-gray-400 bg-[#1f2833]" readonly></textarea>
                    </div>

                    <div>
                        <label class="block text-[11px] font-bold text-gray-400 mb-2 uppercase tracking-wide">Categoria de Dados</label>
                        <select id="categoria" class="input-dark w-full px-4 py-3 rounded-lg text-sm">
                            <option>Combate / Skill</option>
                            <option>Lore / História</option>
                            <option>Interface (UI)</option>
                        </select>
                    </div>

                    <button onclick="salvarPalavra()" class="btn-primary w-full py-4 rounded-lg mt-2 flex justify-center items-center gap-3 uppercase tracking-wider text-xs">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/><path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/></svg>
                        Salvar no Terminal
                    </button>
                </div>
            </aside>

            <main class="w-full lg:w-2/3 flex flex-col gap-6">
                <input type="text" id="campo-busca" oninput="filtrarLista(this.value)" placeholder="Buscar no banco de dados..." class="panel input-dark w-full px-5 py-4 rounded-xl text-sm">
                <div id="lista-palavras" class="flex flex-col gap-4"></div>
            </main>
        </div>
    </div>

    <script src="/app.js?v=3"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => {
                    console.warn('Falha ao registrar o service worker:', err);
                });
            });
        }
    </script>
</body>
</html>
